name: CI

# Build and test on every push and pull request.
on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Use `npm install` rather than `npm ci`: some transitive tooling pulls
      # platform-specific optional deps (e.g. esbuild binaries) that a lockfile
      # generated on another OS can't fully capture, which makes `npm ci` fail
      # on the Linux runner.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
